<!DOCTYPE html>
<html>
<head><title>Α/Ω Icon Preview</title>
<style>
body { background: #1a1f2e; font-family: -apple-system, sans-serif; color: #f0f4fa; padding: 40px; text-align: center; }
.icons { display: flex; gap: 24px; justify-content: center; align-items: flex-end; margin: 40px 0; flex-wrap: wrap; }
.icon { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label { font-size: 11px; color: #8896ad; text-transform: uppercase; letter-spacing: 0.1em; }
h1 { font-family: Georgia, serif; color: #d4a943; font-weight: 500; }
.note { color: #8896ad; font-size: 14px; margin-top: 30px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.5; }
</style>
</head>
<body>
<h1>Α / Ω Icon Preview</h1>

<div class="icons">
  <div class="icon">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <rect width="180" height="180" fill="#0a1424" rx="40"/>
      <text x="50" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Α</text>
      <text x="130" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Ω</text>
    </svg>
    <div class="label">180px (iOS home screen)</div>
  </div>

  <div class="icon">
    <svg width="120" height="120" viewBox="0 0 180 180">
      <rect width="180" height="180" fill="#0a1424" rx="40"/>
      <text x="50" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Α</text>
      <text x="130" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Ω</text>
    </svg>
    <div class="label">120px (Android)</div>
  </div>

  <div class="icon">
    <svg width="60" height="60" viewBox="0 0 180 180">
      <rect width="180" height="180" fill="#0a1424" rx="40"/>
      <text x="50" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Α</text>
      <text x="130" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Ω</text>
    </svg>
    <div class="label">60px (small)</div>
  </div>

  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 180 180">
      <rect width="180" height="180" fill="#0a1424" rx="40"/>
      <text x="50" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Α</text>
      <text x="130" y="128" text-anchor="middle" font-family="Garamond,Georgia,serif" font-size="105" font-weight="500" fill="#d4a943">Ω</text>
    </svg>
    <div class="label">32px (favicon)</div>
  </div>
</div>

<p class="note">This is what the icon will look like on your phone home screen at various sizes. Already updated in your greek-plan.html file.</p>
</body>
</html>
